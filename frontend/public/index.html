<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4F46E5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="SabiBiz - Accounting & WhatsApp Business Management">
  
  <title>SabiBiz - Dashboard</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading SabiBiz...</p>
    </div>
  </div>

  <script>
    // Service worker registration for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('./sw.js');
          console.log('✓ Service Worker registered');

          // Ask the service worker to check for updates immediately
          try { reg.update(); } catch (e) {}

          // When a new service worker is found, ask it to skipWaiting so it becomes active
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }

          reg.addEventListener('updatefound', () => {
            const installing = reg.installing;
            if (!installing) return;
            installing.addEventListener('statechange', () => {
              if (installing.state === 'installed' && reg.waiting) {
                // Tell the waiting worker to become active
                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });

          // When the active worker changes, reload so new assets are used
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('Service worker controller changed — reloading to apply update');
            try {
              window.location.reload();
            } catch (e) {
              window.location.reload();
            }
          });
        } catch (err) {
          console.log('✗ Service Worker registration failed:', err);
        }
      });
    }
  </script>

  <script src="./env.version.js"></script>
  <script>
    (function () {
      var v = window.SABIBIZ_BUILD || Date.now();
      var s = document.createElement('script');
      s.src = './env.js?v=' + encodeURIComponent(v);
      s.async = false;
      document.head.appendChild(s);
    })();
  </script>
  <script src="./js/app.js"></script>
</body>
</html>
